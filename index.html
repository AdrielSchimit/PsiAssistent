<!DOCTYPE html>
<html lang="pt-BR" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0D0C1D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PsyAssist">
  
  <title>PsyAssist | O app premium do psicólogo</title>
  <meta name="description" content="Gestão inteligente para psicólogos. Pacientes, agenda e financeiro num só lugar.">
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/app.css">
  
  <!-- ERROR CATCHER FOR DEBUGGING -->
  <script>
    window.onerror = function(msg, url, line, col, error) {
      const errDiv = document.createElement('div');
      errDiv.style.cssText = 'position:fixed; top:0; left:0; width:100%; z-index:99999; background:red; color:white; padding:20px; font-size:12px; font-family:monospace; word-wrap:break-word;';
      errDiv.innerHTML = `<strong>Error:</strong> ${msg}<br><strong>Line:</strong> ${line}:${col}<br><strong>File:</strong> ${url}<br><pre>${error ? error.stack : ''}</pre>`;
      document.body.appendChild(errDiv);
      return false;
    };
  </script>

  <!-- Tesseract.js for OCR -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  
  <div class="app">
    <!-- Header -->
    <header class="app-header">
      <div class="app-logo">Psy<span>Assist</span></div>
      <div class="header-actions">
        <button class="icon-btn" onclick="Router.navigate('finance')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"></line>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Page Content Area -->
    <main class="page-content" id="page-content">
      <!-- Injected by Router -->
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <div class="nav-item" data-route="schedule">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span>Agenda</span>
      </div>
      
      <div class="nav-item" data-route="book">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        <span>Agendar</span>
      </div>
      
      <div class="nav-item nav-item--center active" data-route="home">
        <div class="nav-center-bg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </div>
        <span>Início</span>
      </div>
      
      <div class="nav-item" data-route="patients">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        <span>Pacientes</span>
      </div>
      
      <div class="nav-item" data-route="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="21" x2="4" y2="14"></line>
          <line x1="4" y1="10" x2="4" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="12"></line>
          <line x1="12" y1="8" x2="12" y2="3"></line>
          <line x1="20" y1="21" x2="20" y2="16"></line>
          <line x1="20" y1="12" x2="20" y2="3"></line>
          <line x1="1" y1="14" x2="7" y2="14"></line>
          <line x1="9" y1="8" x2="15" y2="8"></line>
          <line x1="17" y1="16" x2="23" y2="16"></line>
        </svg>
        <span>Ajustes</span>
      </div>
    </nav>
  </div>

  <!-- Scripts -->
  <script src="js/store.js"></script>
  <script src="js/db.js"></script>
  <script src="js/router.js"></script>
  <script src="js/install.js"></script>
  <script src="js/whatsapp.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/voice-parser.js"></script>
  
  <script src="js/pages/home.js"></script>
  <script src="js/pages/schedule.js"></script>
  <script src="js/pages/book.js"></script>
  <script src="js/pages/patients.js"></script>
  <script src="js/pages/finance.js"></script>
  <script src="js/pages/settings.js"></script>
  
  <script src="js/app.js"></script>
</body>
</html>
